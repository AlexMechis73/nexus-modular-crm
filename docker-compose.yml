# docker-compose.yml
version: '3.8'

services:
  # Servizio 1: Il Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: nexus_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=nexus
      - POSTGRES_DB=nexus_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servizio 2: Il nostro CRM Core Service (che contiene già Prisma)
  crm-core-service:
    build: ./services/crm-core-service # Dice a Docker di costruire l'immagine usando il Dockerfile in questa cartella
    container_name: crm_core_api
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      # Passiamo l'URL del database al nostro servizio. Prisma lo userà per connettersi.
      - DATABASE_URL=postgresql://nexus:nexus@db:5432/nexus_crm
    volumes:
      - ./services/crm-core-service:/app # Mappiamo il codice locale nel container per lo sviluppo live
    depends_on:
      db:
        condition: service_healthy # Parte solo quando il database è pronto

volumes:
  # Volume per rendere persistenti i dati del database
  postgres_data: